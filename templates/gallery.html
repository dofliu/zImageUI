<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品集展示 - Z-Image Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/gallery.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/atelier-global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/atelier-style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="atelier">
        <!-- ══ TOP BAR ══════════════════════════════════════════════ -->
    <header class="at-topbar">
        <div class="at-logo">Z—Image<sup>· ATELIER</sup></div>
        <nav class="at-nav">
            <a href="/">工作室</a>
            <a href="/gallery" class="on">作品集</a>
            <a href="/projects">專案</a>
            <a href="/avatar">Avatar Studio</a>
            <a href="/story">漫畫</a>
            <a href="/dashboard">儀表板</a>
            <a href="/api-docs">API</a>
        </nav>
        <div class="at-spacer"></div>
    <button id="themeToggle" class="at-icon-btn" title="切換主題">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/><path d="M12 1V3M12 21V23M4.22 4.22L5.64 5.64M18.36 18.36L19.78 19.78M1 12H3M21 12H23M4.22 19.78L5.64 18.36M18.36 5.64L19.78 4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
    </header>
    <div class="at-page-content">

    <!-- 作品集列表頁 -->
    <div id="galleryListPage" class="gallery-page">
        <div class="page-content">
            <div class="page-title-bar">
                <h2 data-n="02">作品集</h2>
                <button id="createGalleryBtn" class="create-gallery-btn">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    </svg>
                    建立新作品集
                </button>
            </div>

            <div id="galleriesGrid" class="galleries-grid">
                <p class="empty-state">尚未建立任何作品集</p>
            </div>
        </div>
    </div>

    <!-- 單一作品集檢視頁 -->
    <div id="galleryViewPage" class="gallery-page" style="display: none;">
        <header class="gallery-view-header">
            <button id="backToListBtn" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 12H5M12 19L5 12L12 5" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                返回
            </button>
            <div class="gallery-view-info">
                <h1 id="galleryTitle">作品集標題</h1>
                <p id="galleryDescription" class="gallery-desc"></p>
            </div>
            <div class="gallery-view-actions">
                <span id="galleryViews" class="view-count">0 次瀏覽</span>
                <button id="shareGalleryBtn" class="share-btn" title="分享連結">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 12V20C4 20.5304 4.21071 21.0391 4.58579 21.4142C4.96086 21.7893 5.46957 22 6 22H18C18.5304 22 19.0391 21.7893 19.4142 21.4142C19.7893 21.0391 20 20.5304 20 20V12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M16 6L12 2L8 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 2V15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </header>

        <main class="gallery-view-main">
            <div id="galleryImages" class="gallery-masonry">
                <!-- 圖片將動態載入 -->
            </div>
        </main>
    </div>

    <!-- 建立作品集對話框 -->
    <div id="createGalleryDialog" class="modal-overlay" style="display: none;">
        <div class="modal-content gallery-modal">
            <div class="modal-header">
                <h2>建立新作品集</h2>
                <button id="closeCreateDialog" class="modal-close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="newGalleryTitle">作品集名稱</label>
                    <input type="text" id="newGalleryTitle" placeholder="例如：我的 AI 藝術創作" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="newGalleryDesc">描述 (選填)</label>
                    <textarea id="newGalleryDesc" placeholder="描述這個作品集的主題..." rows="3" maxlength="200"></textarea>
                </div>
                <div class="form-group">
                    <label>展示佈局</label>
                    <div class="layout-options">
                        <button class="layout-option active" data-layout="masonry">瀑布流</button>
