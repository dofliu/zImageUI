<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專案管理 - Z-Image Studio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/projects.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/atelier-global.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <h1>Z-Image Studio</h1>
            </div>
            <nav class="header-nav">
                <a href="/" class="nav-link">工作室</a>
                <a href="/gallery" class="nav-link">作品集</a>
                <a href="/projects" class="nav-link active">專案</a>
                <a href="/story" class="nav-link">漫畫工作室</a>
                <a href="/dashboard" class="nav-link">儀表板</a>
                <a href="/api-docs" class="nav-link">API</a>
            </nav>
            <button id="themeToggle" class="theme-toggle-btn" title="切換主題">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2" />
                    <path d="M12 1V3M12 21V23M4.22 4.22L5.64 5.64M18.36 18.36L19.78 19.78M1 12H3M21 12H23M4.22 19.78L5.64 18.36M18.36 5.64L19.78 4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </header>

    <!-- 專案列表頁 -->
    <main id="projectListPage" class="projects-main">
        <div class="projects-title-bar">
            <h2 data-n="03">專案管理</h2>
            <div class="projects-title-actions">
                <select id="statusFilter" class="status-filter">
                    <option value="">全部狀態</option>
                    <option value="active">進行中</option>
                    <option value="completed">已完成</option>
                    <option value="archived">已歸檔</option>
                </select>
                <button id="createProjectBtn" class="create-project-btn">
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    新增專案
                </button>
            </div>
        </div>

        <div id="projectsGrid" class="projects-grid">
            <p class="empty-state">載入中...</p>
        </div>
    </main>

    <!-- 專案詳情頁 -->
    <div id="projectDetailPage" class="project-detail-page" style="display: none;">
        <div class="detail-header">
            <button id="backToProjectsBtn" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M19 12H5M12 19L5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                返回
            </button>
            <div class="detail-title-area">
                <h1 id="detailProjectName">專案名稱</h1>
                <p id="detailProjectDesc" class="detail-desc"></p>
            </div>
            <div class="detail-actions">
                <select id="detailStatusSelect" class="status-select">
                    <option value="active">進行中</option>
                    <option value="completed">已完成</option>
                    <option value="archived">已歸檔</option>
                </select>
                <button id="deleteProjectBtn" class="delete-project-btn" title="刪除專案">
                    <svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
        </div>

        <!-- 專案統計 -->
        <div class="detail-stats">
            <div class="detail-stat">
                <span class="detail-stat-value" id="detailImageCount">0</span>
                <span class="detail-stat-label">張圖片</span>
            </div>
            <div class="detail-stat">
                <span class="detail-stat-value" id="detailAvgRating">-</span>
                <span class="detail-stat-label">平均評分</span>
            </div>
            <div class="detail-stat">
                <span class="detail-stat-value" id="detailModelsUsed">0</span>
                <span class="detail-stat-label">模型使用</span>
            </div>
        </div>

        <!-- 專案設定摘要 -->
        <div id="detailSettings" class="detail-settings" style="display: none;">
            <span class="setting-chip" id="settingModel"></span>
            <span class="setting-chip" id="settingStyle"></span>
            <span class="setting-chip" id="settingSize"></span>
        </div>

        <!-- 專案備註 -->
        <div class="detail-notes-section">
            <textarea id="detailNotes" class="detail-notes" placeholder="點擊輸入專案備註..." rows="2"></textarea>
        </div>

        <!-- 圖片網格 -->
        <div id="detailImagesGrid" class="detail-images-grid">
            <p class="empty-state">這個專案還沒有圖片</p>
        </div>
    </div>

    <!-- 建立專案對話框 -->
    <div id="createProjectDialog" class="modal-overlay" style="display: none;">
        <div class="modal-content project-modal">
            <div class="modal-header">
                <h2>建立新專案</h2>
                <button id="closeProjectDialog" class="modal-close-btn">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="newProjectName">專案名稱 *</label>
                    <input type="text" id="newProjectName" placeholder="例如：產品宣傳圖" maxlength="50">
                </div>
                <div class="form-group">
                    <label for="newProjectDesc">描述</label>
                    <textarea id="newProjectDesc" placeholder="描述這個專案的目標..." rows="3" maxlength="200"></textarea>
                </div>
                <div class="form-group">
                    <label for="defaultNegPrompt">預設負面提示詞</label>
                    <input type="text" id="defaultNegPrompt" placeholder="blurry, low quality, ...">
                </div>
            </div>
            <div class="modal-footer">
                <button id="cancelProjectBtn" class="modal-btn cancel-btn">取消</button>
                <button id="confirmProjectBtn" class="modal-btn confirm-btn">建立</button>
            </div>
        </div>
    </div>

    </div><!-- .container -->
    <script src="{{ url_for('static', filename='js/themeManager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/projectManager.js') }}"></script>
</body>

</html>
